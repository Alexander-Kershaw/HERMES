table: stores
primary_key:
  - store_id

columns:
  store_id:
    type: string
    rules:
      - not_null
      - unique
      - regex: "^STORE-[0-9]{4}$"

  store_name:
    type: string
    rules:
      - not_null

  city:
    type: string
    rules:
      - not_null

  region:
    type: string
    rules:
      - not_null

  opening_date:
    type: date
    rules:
      - not_null

  store_format:
    type: string
    rules:
      - not_null
      - accepted_values:
          - convenience
          - standard
          - flagship
          - warehouse

  is_active:
    type: boolean
    rules:
      - not_null

  postal_code:
    type: string
    rules:
      - not_null
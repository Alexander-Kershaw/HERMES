table: order_items
primary_key:
  - order_item_id

columns:
  order_item_id:
    type: string
    rules:
      - not_null
      - unique
      - regex: "^ORDER-[0-9]{8}-[0-9]{3}$"

  order_id:
    type: string
    rules:
      - not_null
      - regex: "^ORDER-[0-9]{8}$"

  product_id:
    type: string
    rules:
      - not_null
      - regex: "^PRODUCT-[0-9]{6}$"

  line_number:
    type: integer
    rules:
      - min_value: 1

  quantity:
    type: integer
    rules:
      - min_value: 1

  unit_price:
    type: double
    rules:
      - min_value: 0

  gross_amount:
    type: double
    rules:
      - min_value: 0

  discount_amount:
    type: double
    rules:
      - min_value: 0

  net_amount:
    type: double
    rules:
      - min_value: 0

  tax_amount:
    type: double
    rules:
      - min_value: 0
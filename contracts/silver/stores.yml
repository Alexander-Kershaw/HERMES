table: stores
primary_key:
  - store_id

columns:
  store_id:
    type: string
    rules:
      - not_null
      - unique
      - regex: "^STORE-[0-9]{4}$"

  store_format:
    type: string
    rules:
      - not_null
      - accepted_values:
          - convenience
          - standard
          - flagship
          - warehouse

  is_active:
    type: boolean
    rules:
      - not_null
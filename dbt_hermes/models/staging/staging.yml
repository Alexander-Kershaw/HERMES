version: 2

models:
  - name: stg_customers
    description: "Staged customer records from Silver."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: loyalty_tier
        tests:
          - accepted_values:
              arguments:
                values: ["Bronze", "Silver", "Gold", "Platinum"]
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: email
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
      - name: phone_number
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: region
        tests:
          - not_null
      - name: postal_code
        tests:
          - not_null
      - name: address
        tests:
          - not_null
      - name: creation_datetime
        tests:
          - not_null
      - name: is_active
        tests:
          - not_null


  - name: stg_stores
    description: "Staged store records from Silver."
    columns:
      - name: store_id
        tests:
          - not_null
          - unique
      - name: store_format
        tests:
          - accepted_values:
              arguments:
                values: ["convenience", "standard", "flagship", "warehouse"]
      - name: store_name
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: region
        tests:
          - not_null
      - name: opening_date
        tests:
          - not_null
      - name: is_active
        tests:
          - not_null
      - name: postal_code
        tests:
          - not_null


  - name: stg_products
    description: "Staged product catalogue records from Silver."
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^PRODUCT-[0-9]{6}$"
      - name: category
        tests:
          - accepted_values:
              arguments:
                values: ["Grocery", "Electronics", "Clothing", "Home", "Health"]
      - name: sku
        tests:
          - not_null
          - unique
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: cost_price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: is_active
        tests:
          - not_null
      - name: creation_datetime
        tests:
          - not_null


  - name: stg_orders
    description: "Staged order header records from Silver."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^ORDER-[0-9]{8}$"
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: channel
        tests:
          - accepted_values:
              arguments:
                values: ["online", "store", "mobile_app"]
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["confirmed", "fulfilled", "cancelled", "returned"]
      - name: payment_method
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["credit_card", "debit_card", "paypal", "gift_card", "apple_pay", "google_pay"]
      - name: created_by_system
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["ecommerce_platform", "pos_system", "mobile_app"]        
      - name: currency
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["GBP"]


  - name: stg_order_items
    description: "Staged order line records from Silver."
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^ORDER-[0-9]{8}-[0-9]{3}$"
      - name: order_id
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^ORDER-[0-9]{8}$"
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^PRODUCT-[0-9]{6}$"
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id


  - name: stg_inventory_snapshots
    description: "Staged inventory snapshot records from Silver."
    columns:
      - name: inventory_snapshot_id
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^STORE-[0-9]{4}$"
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_id
      - name: product_id
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^PRODUCT-[0-9]{6}$"
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id


  - name: stg_promotions
    description: "Staged promotion records from Silver."
    columns:
      - name: promotion_id
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^PROMO-[0-9]{4}$"
      - name: product_id
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^PRODUCT-[0-9]{6}$"
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: channel
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["online", "store", "mobile_app"]
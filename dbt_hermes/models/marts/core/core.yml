version: 2

models:
  - name: dim_customer
    description: "Customer dimension for retail analytics."
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_product
    description: "Product dimension for retail analytics."
    columns:
      - name: product_key
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_stores
    description: "Store dimension for retail analytics."
    columns:
      - name: store_key
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null
          - unique

  - name: fct_sales
    description: "Order-line grain sales fact table."
    columns:
      - name: sales_key
        tests:
          - not_null
          - unique
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: net_amount
        tests:
          - not_null

  - name: fct_inventory_snapshot
    description: "Store-product inventory snapshot fact table."
    columns:
      - name: inventory_snapshot_key
        tests:
          - not_null
          - unique
      - name: inventory_snapshot_id
        tests:
          - not_null
          - unique